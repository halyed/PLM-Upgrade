name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ─── Tests ──────────────────────────────────────────────────────────────────

  test-plm-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin', cache: maven }
      - name: Run PLM Core Service tests
        working-directory: ./services/plm-core-service
        run: ./mvnw test

  test-workflow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin', cache: maven }
      - name: Run Workflow Service tests
        working-directory: ./services/workflow-service
        run: ./mvnw test

  test-search:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin', cache: maven }
      - name: Run Search Service tests
        working-directory: ./services/search-service
        run: ./mvnw test

  test-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin', cache: maven }
      - name: Run Integration Service tests
        working-directory: ./services/integration-service
        run: ./mvnw test

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-angular/package-lock.json
      - name: Install and build
        working-directory: ./frontend-angular
        run: |
          npm ci
          npm run build

  # ─── Build & Push Images ────────────────────────────────────────────────────

  build-and-push:
    needs: [test-plm-core, test-workflow, test-search, test-integration, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase image name
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> $GITHUB_ENV

      - name: Build and push plm-core-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/plm-core-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-plm-core:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push cad-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/cad-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-cad:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push search-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/search-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-search:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push workflow-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/workflow-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-workflow:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push integration-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/integration-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-integration:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push notification-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/notification-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-notification:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push reporting-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/reporting-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-reporting:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend-angular
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-angular
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy ─────────────────────────────────────────────────────────────────
  # Required GitHub Secrets:
  #   VPS_HOST      — OVH VPS IP or hostname
  #   VPS_USER      — SSH user (e.g. ubuntu or root)
  #   VPS_SSH_KEY   — Private SSH key (paste the full PEM content)

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to OVH VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/plm-upgrade
            git pull origin main
            docker compose -f infrastructure/docker/docker-compose.yml pull
            docker compose -f infrastructure/docker/docker-compose.yml up -d --remove-orphans
