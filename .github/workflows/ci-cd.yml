name: CI/CD Pipeline

on:
  push:
    branches: [main, v2-dev]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ─── Tests ──────────────────────────────────────────────────────────────────

  test-plm-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run PLM Core Service tests
        working-directory: ./services/plm-core-service
        run: ./mvnw test

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-angular/package-lock.json
      - name: Install and build
        working-directory: ./frontend-angular
        run: |
          npm ci
          npm run build

  # ─── Build & Push Images ────────────────────────────────────────────────────

  build-and-push:
    needs: [test-plm-core, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push plm-core-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/plm-core-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-plm-core:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push cad-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/cad-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-cad:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push search-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/search-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-search:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push workflow-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/workflow-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-workflow:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push integration-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/integration-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-integration:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend-angular
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-angular
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy ─────────────────────────────────────────────────────────────────

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/plm-upgrade
            docker compose -f infrastructure/docker/docker-compose.yml pull
            docker compose -f infrastructure/docker/docker-compose.yml up -d --remove-orphans
