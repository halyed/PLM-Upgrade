# Used only during first cert issuance (before HTTPS is configured)
worker_processes 1;

events {
    worker_connections 1024;
}

http {
    server {
        listen 80;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 200 'PLM init mode — waiting for SSL cert';
            add_header Content-Type text/plain;
        }
    }
}
