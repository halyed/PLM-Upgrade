worker_processes 1;

events {
    worker_connections 1024;
}

http {
    server {
        listen 80;

        # Docker DNS resolver — re-resolves service IPs every 30s
        resolver 127.0.0.11 valid=30s ipv6=off;

        # Strip trailing slashes from API paths (Spring Boot 3 doesn't match them)
        rewrite ^(/api/[^/]+)/+$ $1 last;

        # PLM Core
        location /api/items {
            set $upstream http://plm-core-service:8080;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/revisions {
            set $upstream http://plm-core-service:8080;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/change-requests {
            set $upstream http://plm-core-service:8080;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/documents {
            set $upstream http://plm-core-service:8080;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/audit-logs {
            set $upstream http://plm-core-service:8080;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Other services
        location /api/workflows {
            set $upstream http://workflow-service:8082;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 30s;
        }
        location /api/search {
            set $upstream http://search-service:8083;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/integration {
            set $upstream http://integration-service:8084;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/notifications {
            set $upstream http://notification-service:8085;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /ws-notifications {
            set $upstream http://notification-service:8085;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
        location /api/reports {
            set $upstream http://reporting-service:8086;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/cad {
            set $upstream http://cad-service:5000;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Frontend (catch-all)
        location / {
            set $upstream http://frontend-angular:80;
            proxy_pass $upstream;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
