worker_processes 1;

events {
    worker_connections 1024;
}

http {
    upstream auth_service {
        server auth-service:8081;
    }

    upstream plm_core_service {
        server plm-core-service:8080;
    }

    upstream cad_service {
        server cad-service:5000;
    }

    upstream workflow_service {
        server workflow-service:8082;
    }

    upstream search_service {
        server search-service:8083;
    }

    server {
        listen 80;

        # Auth
        location /api/auth/ {
            proxy_pass http://auth_service/api/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # PLM Core
        location /api/items/ {
            proxy_pass http://plm_core_service/api/items/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/revisions/ {
            proxy_pass http://plm_core_service/api/revisions/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/change-requests/ {
            proxy_pass http://plm_core_service/api/change-requests/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # CAD
        location /api/cad/ {
            proxy_pass http://cad_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Workflow
        location /api/workflows/ {
            proxy_pass http://workflow_service/api/workflows/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Search
        location /api/search/ {
            proxy_pass http://search_service/api/search/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Frontend
        location / {
            proxy_pass http://frontend-angular:4200;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
