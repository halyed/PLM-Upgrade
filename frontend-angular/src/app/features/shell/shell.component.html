<mat-sidenav-container style="height:100vh">
  <mat-sidenav mode="side" opened style="width:220px">
    <div style="padding:16px;font-weight:500;font-size:18px;color:#3f51b5">PLM Platform</div>
    <mat-nav-list>
      <a mat-list-item routerLink="/items" routerLinkActive="active-link">
        <mat-icon matListItemIcon>inventory_2</mat-icon>
        <span matListItemTitle>Items</span>
      </a>
      <a mat-list-item routerLink="/search" routerLinkActive="active-link">
        <mat-icon matListItemIcon>search</mat-icon>
        <span matListItemTitle>Search</span>
      </a>
      <a mat-list-item routerLink="/change-requests" routerLinkActive="active-link">
        <mat-icon matListItemIcon>change_circle</mat-icon>
        <span matListItemTitle>Change Requests</span>
      </a>
      <a mat-list-item routerLink="/workflows/tasks" routerLinkActive="active-link">
        <mat-icon matListItemIcon>task_alt</mat-icon>
        <span matListItemTitle>Task Inbox</span>
      </a>
      <a mat-list-item routerLink="/reports" routerLinkActive="active-link">
        <mat-icon matListItemIcon>bar_chart</mat-icon>
        <span matListItemTitle>Reports</span>
      </a>
      <a mat-list-item routerLink="/integration" routerLinkActive="active-link">
        <mat-icon matListItemIcon>cable</mat-icon>
        <span matListItemTitle>Integrations</span>
      </a>
      <a mat-list-item routerLink="/audit-log" routerLinkActive="active-link" *ngIf="auth.isAdmin()">
        <mat-icon matListItemIcon>history</mat-icon>
        <span matListItemTitle>Audit Log</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary">
      <input
        #searchInput
        type="text"
        placeholder="Search items…"
        (keyup.enter)="onSearch(searchInput.value)"
        style="background:rgba(255,255,255,0.15);border:none;border-radius:4px;padding:6px 12px;
               color:white;font-size:14px;width:240px;outline:none;margin-right:8px"
      >
      <button mat-icon-button (click)="onSearch(searchInput.value)" matTooltip="Search">
        <mat-icon>search</mat-icon>
      </button>
      <span class="spacer"></span>
      <button mat-icon-button routerLink="/notifications" matTooltip="Notifications">
        <mat-icon [matBadge]="unreadCount() > 0 ? unreadCount() : null" matBadgeColor="warn">notifications</mat-icon>
      </button>
      <span style="margin-right:12px;margin-left:8px">{{ auth.isLoggedIn() ? auth.getUsername() : '' }}</span>
      <button mat-icon-button (click)="auth.logout()" matTooltip="Logout">
        <mat-icon>logout</mat-icon>
      </button>
    </mat-toolbar>
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
