# PLM Platform v2 — Full microservices stack
# Run from repo root: docker compose -f infrastructure/docker/docker-compose.yml up

services:

  # ─── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: plm-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-plm}
      POSTGRES_USER: ${POSTGRES_USER:-plm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-plm_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../services/plm-core-service/db/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-plm_user} -d ${POSTGRES_DB:-plm}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: plm-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: plm-kafka
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: plm-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: plm-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: plm-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: plm-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: plm-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: unless-stopped

  keycloak-db:
    image: postgres:15-alpine
    container_name: plm-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: ${KC_DB_USER:-keycloak}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:-keycloak}
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Auth Service (Keycloak) ───────────────────────────────────────────────

  auth-service:
    image: quay.io/keycloak/keycloak:24.0
    container_name: plm-auth-service
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: ${KC_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-keycloak}
    volumes:
      - ../../services/auth-service/realm-export.json:/opt/keycloak/data/import/realm-export.json
    ports:
      - "8081:8080"
    depends_on:
      keycloak-db:
        condition: service_healthy
    restart: unless-stopped

  # ─── PLM Core Service ──────────────────────────────────────────────────────

  plm-core-service:
    build: ../../services/plm-core-service
    container_name: plm-core-service
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-plm}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-plm_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-plm_pass}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://localhost:9000}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      CONVERSION_SERVICE_URL: http://cad-service:5000
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KEYCLOAK_JWK_SET_URI: http://auth-service:8080/realms/plm/protocol/openid-connect/certs
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  # ─── CAD Service ──────────────────────────────────────────────────────────

  cad-service:
    build: ../../services/cad-service
    container_name: plm-cad-service
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ─── Workflow Service (Camunda 8) ─────────────────────────────────────────

  camunda:
    image: camunda/zeebe:latest
    container_name: plm-camunda
    environment:
      CAMUNDA_SECURITY_AUTHENTICATION_UNPROTECTEDAPI: "true"
      CAMUNDA_SECURITY_AUTHORIZATIONS_ENABLED: "false"
    ports:
      - "26500:26500"   # Zeebe gRPC
      - "9600:9600"     # Zeebe monitoring REST
    restart: unless-stopped

  workflow-service:
    build: ../../services/workflow-service
    container_name: plm-workflow-service
    ports:
      - "8082:8082"
    environment:
      KEYCLOAK_JWK_SET_URI: http://auth-service:8080/realms/plm/protocol/openid-connect/certs
      ZEEBE_ADDRESS: camunda:26500
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - camunda
      - kafka
      - auth-service
    restart: unless-stopped

  # ─── Search Service (Elasticsearch) ──────────────────────────────────────

  search-service:
    build: ../../services/search-service
    container_name: plm-search-service
    ports:
      - "8083:8083"
    environment:
      KEYCLOAK_JWK_SET_URI: http://auth-service:8080/realms/plm/protocol/openid-connect/certs
      ELASTICSEARCH_URIS: elasticsearch:9200
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - elasticsearch
      - kafka
      - auth-service
    restart: unless-stopped

  # ─── Integration Service ──────────────────────────────────────────────────

  integration-service:
    build: ../../services/integration-service
    container_name: plm-integration-service
    ports:
      - "8084:8084"
    environment:
      KEYCLOAK_JWK_SET_URI: http://auth-service:8080/realms/plm/protocol/openid-connect/certs
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # Enable connectors via env vars when credentials are available
      ODOO_ENABLED: ${ODOO_ENABLED:-false}
      ODOO_URL: ${ODOO_URL:-http://localhost:8069}
      ODOO_DATABASE: ${ODOO_DATABASE:-plm}
      ODOO_USERNAME: ${ODOO_USERNAME:-admin}
      ODOO_PASSWORD: ${ODOO_PASSWORD:-admin}
      MES_ENABLED: ${MES_ENABLED:-false}
      MES_URL: ${MES_URL:-http://localhost:9090}
      MES_API_KEY: ${MES_API_KEY:-changeme}
      FREECAD_ENABLED: ${FREECAD_ENABLED:-false}
      FREECAD_URL: ${FREECAD_URL:-http://localhost:8888}
      FREECAD_API_KEY: ${FREECAD_API_KEY:-changeme}
    depends_on:
      - kafka
      - auth-service
    restart: unless-stopped

  # ─── Notification Service ─────────────────────────────────────────────────

  notification-service:
    build: ../../services/notification-service
    container_name: plm-notification-service
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-plm}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-plm_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-plm_pass}
      KEYCLOAK_JWK_SET_URI: http://auth-service:8080/realms/plm/protocol/openid-connect/certs
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      NOTIFICATION_EMAIL_ENABLED: ${NOTIFICATION_EMAIL_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: unless-stopped

  # ─── Reporting Service ─────────────────────────────────────────────────────

  reporting-service:
    build: ../../services/reporting-service
    container_name: plm-reporting-service
    ports:
      - "8086:8086"
    environment:
      KEYCLOAK_JWK_SET_URI: http://auth-service:8080/realms/plm/protocol/openid-connect/certs
      PLM_CORE_URL: http://plm-core-service:8080
    depends_on:
      - plm-core-service
      - auth-service
    restart: unless-stopped

  # ─── API Gateway ──────────────────────────────────────────────────────────

  api-gateway:
    build: ../../api-gateway
    container_name: plm-api-gateway
    ports:
      - "80:80"
    depends_on:
      - plm-core-service
      - auth-service
      - cad-service
    restart: unless-stopped

  # ─── Frontend ─────────────────────────────────────────────────────────────

  frontend-angular:
    build: ../../frontend-angular
    container_name: plm-frontend
    ports:
      - "4200:80"
    depends_on:
      - api-gateway
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  es_data:
  keycloak_db_data:
  grafana_data:
