global:
  scrape_interval: 15s

scrape_configs:
  - job_name: plm-core-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['plm-core-service:8080']

  - job_name: workflow-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['workflow-service:8082']

  - job_name: search-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['search-service:8083']

  - job_name: integration-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['integration-service:8084']

  - job_name: notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['notification-service:8085']

  - job_name: reporting-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['reporting-service:8086']
