apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-angular
  namespace: plm
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend-angular
  template:
    metadata:
      labels:
        app: frontend-angular
    spec:
      containers:
        - name: frontend-angular
          image: ghcr.io/halyed/plm-upgrade-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-angular
  namespace: plm
spec:
  selector:
    app: frontend-angular
  ports:
    - port: 80
      targetPort: 80
