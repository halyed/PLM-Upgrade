apiVersion: apps/v1
kind: Deployment
metadata:
  name: plm-core-service
  namespace: plm
spec:
  replicas: 2
  selector:
    matchLabels:
      app: plm-core-service
  template:
    metadata:
      labels:
        app: plm-core-service
    spec:
      containers:
        - name: plm-core-service
          image: ghcr.io/halyed/plm-upgrade-plm-core:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: plm-config
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/$(POSTGRES_DB)
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: plm-secrets
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: plm-secrets
                  key: POSTGRES_PASSWORD
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: plm-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: plm-secrets
                  key: MINIO_ROOT_PASSWORD
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: plm-core-service
  namespace: plm
spec:
  selector:
    app: plm-core-service
  ports:
    - port: 8080
      targetPort: 8080
