apiVersion: apps/v1
kind: Deployment
metadata:
  name: reporting-service
  namespace: plm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reporting-service
  template:
    metadata:
      labels:
        app: reporting-service
    spec:
      containers:
        - name: reporting-service
          image: ghcr.io/halyed/plm-upgrade-reporting:latest
          ports:
            - containerPort: 8086
          envFrom:
            - configMapRef:
                name: plm-config
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8086
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: reporting-service
  namespace: plm
spec:
  selector:
    app: reporting-service
  ports:
    - port: 8086
      targetPort: 8086
