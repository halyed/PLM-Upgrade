server.port=8084

# Keycloak
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_SET_URI:http://localhost:8081/realms/plm/protocol/openid-connect/certs}

# Kafka
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=integration-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.listener.auto-startup=true

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ─── Connector configuration ─────────────────────────────────────────────────
# Set enabled=true and fill in credentials to activate a connector.

# Odoo ERP
integration.connectors.odoo.enabled=${ODOO_ENABLED:false}
integration.connectors.odoo.url=${ODOO_URL:http://localhost:8069}
integration.connectors.odoo.database=${ODOO_DATABASE:plm}
integration.connectors.odoo.username=${ODOO_USERNAME:admin}
integration.connectors.odoo.password=${ODOO_PASSWORD:admin}

# MES
integration.connectors.mes.enabled=${MES_ENABLED:false}
integration.connectors.mes.url=${MES_URL:http://localhost:9090}
integration.connectors.mes.api-key=${MES_API_KEY:changeme}

# FreeCAD
integration.connectors.freecad.enabled=${FREECAD_ENABLED:false}
integration.connectors.freecad.url=${FREECAD_URL:http://localhost:8888}
integration.connectors.freecad.api-key=${FREECAD_API_KEY:changeme}
