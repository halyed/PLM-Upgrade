server.port=8085

# Database (shared plm DB — separate notifications table)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/plm}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:plm_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:plm_pass}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Keycloak
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_SET_URI:http://localhost:8081/realms/plm/protocol/openid-connect/certs}

# Kafka
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=notification-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Email (optional — disable by leaving host empty)
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
notification.email.from=${NOTIFICATION_EMAIL_FROM:noreply@plm.local}
notification.email.enabled=${NOTIFICATION_EMAIL_ENABLED:false}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
