spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

minio.endpoint=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket.raw=test-raw
minio.bucket.gltf=test-gltf

conversion.service.url=http://localhost:5000

# Disable Rabbit auto-config; keep Kafka but prevent listeners from connecting
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
spring.kafka.bootstrap-servers=localhost:9999
spring.kafka.listener.auto-startup=false

# Keycloak issuer URI — overridden by @MockBean JwtDecoder in context tests
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081/realms/plm
