server.port=8082

# Keycloak OAuth2 Resource Server
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/plm}

# Camunda 8 (Zeebe)
zeebe.client.broker.grpc-address=${ZEEBE_GRPC_ADDRESS:http://localhost:26500}
zeebe.client.security.plaintext=true

# Kafka
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=workflow-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
